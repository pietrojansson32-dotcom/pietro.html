```html
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .chat-bubble { animation: pop 0.3s ease-out; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans overflow-hidden">

    <!-- Cabeçalho -->
    <header class="bg-white border-b px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl">
                <i class="fas fa-robot text-white text-lg"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Nexus IA</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] text-slate-400 font-bold uppercase">Online</span>
        </div>
    </header>

    <!-- Área de Mensagens -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex justify-start chat-bubble">
            <div class="max-w-[85%] bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-200 text-slate-700">
                Olá! Sou o teu Nexus IA. Coloca a tua chave no código para eu poder responder!
            </div>
        </div>
    </main>

    <!-- Zona de Escrita -->
    <footer class="p-4 bg-white border-t border-slate-200 pb-10">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" 
                class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 rounded-2xl px-5 py-4 focus:outline-none text-slate-700"
                placeholder="Escreve uma mensagem...">
            <button onclick="handleSend()" id="send-btn"
                class="bg-indigo-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl hover:bg-indigo-700 active:scale-90 transition-all shadow-lg">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        // --- CONFIGURAÇÃO ---
        // COLA A TUA CHAVE ABAIXO DENTRO DAS ASPAS
        const apiKey = "AQUI_VAI_A_TUA_CHAVE"; 

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} chat-bubble`;
            
            const style = role === 'user' 
                ? 'bg-indigo-600 text-white rounded-tr-none' 
                : 'bg-white text-slate-700 border border-slate-200 rounded-tl-none';

            div.innerHTML = `<div class="max-w-[85%] p-4 rounded-2xl shadow-md ${style}">${text.replace(/\n/g, '<br>')}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            if (apiKey.includes("AQUI_VAI") || apiKey === "") {
                addMessage("⚠️ Erro: Precisas de colocar a tua API Key no código do GitHub!", "bot");
                return;
            }

            addMessage(text, 'user');
            userInput.value = '';
            
            const loading = document.createElement('div');
            loading.className = 'text-xs text-slate-400 animate-pulse p-2';
            loading.innerText = 'Nexus está a pensar...';
            chatContainer.appendChild(loading);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // Usando o modelo Gemini 1.5 Flash que é mais estável para chaves gratuitas
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                loading.remove();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    addMessage(data.candidates[0].content.parts[0].text, 'bot');
                } else {
                    addMessage("Houve um problema com a resposta da IA. Tenta novamente.", "bot");
                }
            } catch (error) {
                if(loading) loading.remove();
                addMessage("Erro de ligação! Verifica se a tua chave está correta e se tens internet.", "bot");
                console.error(error);
            }
        }
    </script>
</body>
</html>
